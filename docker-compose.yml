services:
  # Local-only Postgres. In production (Coolify) the DB is external — set DATABASE_URL and
  # do NOT activate this profile. Locally: `docker compose --profile local up`.
  postgres:
    image: postgres:16-alpine
    profiles: ["local"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scopegate
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-in-production}
        BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
        ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@scopegate.local}
        ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    environment:
      # External DB in prod; falls back to the local `postgres` service for `--profile local`.
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/scopegate?schema=public}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-in-production}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@scopegate.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      CRON_SECRET: ${CRON_SECRET:-}
    ports:
      - "3000:3000"
    restart: unless-stopped

  # Triggers CRON_SECRET-guarded endpoints on schedule (see docker/crontab).
  # Separate service = a single runner, so jobs don't double-fire if app is scaled to >1 replica.
  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    environment:
      CRON_SECRET: ${CRON_SECRET:-}
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
